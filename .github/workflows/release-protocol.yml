name: Release cdp-protocol

on:
  push:
    tags:
      - "cdp-protocol-v*.*.*"

permissions:
  contents: write

jobs:
  publish-crate:
    name: Publish cdp-protocol to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable

      - name: Check crates.io token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: test -n "$CARGO_REGISTRY_TOKEN"

      - name: Dry run
        run: cargo publish --manifest-path crates/cdp-protocol/Cargo.toml --dry-run

      - name: Publish cdp-protocol
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --manifest-path crates/cdp-protocol/Cargo.toml

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-crate
    steps:
      - uses: actions/checkout@v7
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
