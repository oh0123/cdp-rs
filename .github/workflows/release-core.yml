name: Release cdp-core

on:
  push:
    tags:
      - "cdp-core-v*.*.*"

permissions:
  contents: write

jobs:
  publish-crate:
    name: Publish cdp-core to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Wait for cdp-protocol index
        run: |
          for i in {1..30}; do
            cargo search cdp-protocol | grep 'cdp-protocol = "0.3.2"' && exit 0
            sleep 10
          done
          echo "cdp-protocol 0.3.2 not visible in crates.io index"
          exit 1

      - name: Check crates.io token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: test -n "$CARGO_REGISTRY_TOKEN"

      - name: Dry run
        run: cargo publish --manifest-path crates/cdp-core/Cargo.toml --dry-run

      - name: Publish cdp-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --manifest-path crates/cdp-core/Cargo.toml

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
